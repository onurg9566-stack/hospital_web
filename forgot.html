<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şifremi Unuttum</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4 shadow" style="width: 400px;">
<h3 class="text-center mb-4">Şifre Değiştir</h3>

{% if success %}
<div class="alert alert-success">{{ success }}</div>
{% endif %}

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post">
<div class="mb-3">
<label for="username" class="form-label">Kullanıcı Adı</label>
<input type="text" class="form-control" id="username" name="username" required>
</div>

<div class="mb-3">
<label for="password" class="form-label">Yeni Şifre</label>
<input type="password" class="form-control" id="password" name="password" required>
</div>

<div class="mb-3">
<label for="password2" class="form-label">Yeni Şifre Tekrar</label>
<input type="password" class="form-control" id="password2" name="password2" required>
</div>

<button type="submit" class="btn btn-primary w-100">Şifreyi Değiştir</button>
</form>

<div class="text-center mt-3">
<a href="/login">Giriş Sayfasına Dön</a>
</div>
</div>
</div>
</body>
</html>
